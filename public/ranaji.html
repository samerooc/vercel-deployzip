E html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — StudyVault</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#04060e;--s1:#080d1a;--card:#0f1629;--card2:#121c33;
  --border:#1a2540;--border2:#243052;
  --a:#6c63ff;--a2:#8b5cf6;--cyan:#06d6f5;
  --green:#22c55e;--red:#ef4444;
  --text:#e8eaf6;--muted:#64748b;--muted2:#94a3b8;--r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

.orb-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;animation:drift 20s ease-in-out infinite alternate}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#6c63ff,transparent);top:-100px;left:-100px}
.orb2{width:300px;height:300px;background:radial-gradient(circle,#06d6f5,transparent);bottom:-60px;right:-60px;animation-delay:-10s}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(40px,30px)}}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative;z-index:1}
.login-box{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:28px;padding:48px 40px;width:100%;max-width:420px;text-align:center;box-shadow:0 32px 80px rgba(0,0,0,.6),0 0 0 1px rgba(108,99,255,.08)}
.login-logo{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700;background:linear-gradient(135deg,var(--a),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.login-sub{color:var(--muted);font-size:.875rem;margin-bottom:36px}
.login-label{display:block;text-align:left;font-size:.8rem;font-weight:600;color:var(--muted2);margin-bottom:8px;letter-spacing:.5px}
.login-input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);padding:14px 18px;border-radius:12px;font-size:.95rem;outline:none;margin-bottom:20px;font-family:'Outfit',sans-serif;transition:border-color .2s}
.login-input:focus{border-color:var(--a);background:rgba(108,99,255,.06)}
.login-btn{width:100%;background:linear-gradient(135deg,var(--a),var(--a2));color:#fff;border:none;padding:14px;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .25s;box-shadow:0 8px 24px rgba(108,99,255,.4)}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(108,99,255,.5)}
.login-err{color:var(--red);font-size:.82rem;margin-top:14px;display:none;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);padding:10px 14px;border-radius:10px}

/* APP */
#app{display:none;position:relative;z-index:1;min-height:100vh}
header{display:flex;align-items:center;gap:14px;padding:0 32px;height:64px;background:rgba(4,6,14,.8);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:0;z-index:100}
.h-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.2rem;background:linear-gradient(135deg,var(--a),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h-badge{background:rgba(108,99,255,.15);border:1px solid rgba(108,99,255,.3);color:var(--a2);font-size:.72rem;padding:4px 12px;border-radius:100px;font-weight:600;letter-spacing:.5px}
.h-logout{margin-left:auto;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);padding:8px 18px;border-radius:10px;cursor:pointer;font-size:.82rem;font-family:'Outfit',sans-serif;font-weight:500;transition:all .2s}
.h-logout:hover{background:rgba(239,68,68,.15);border-color:var(--red)}

.wrap{max-width:900px;margin:0 auto;padding:40px 24px}
.page-header{margin-bottom:36px}
.page-tag{font-size:.72rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--a);margin-bottom:10px}
.page-ttl{font-family:'Space Grotesk',sans-serif;font-size:2rem;font-weight:700}
.page-desc{color:var(--muted2);font-size:.9rem;margin-top:8px}

/* Batch block */
.batch-block{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:18px;margin-bottom:16px;overflow:hidden;transition:border-color .25s}
.batch-block.open{border-color:var(--border2)}
.batch-row{display:flex;align-items:center;gap:14px;padding:18px 20px;cursor:pointer;transition:background .2s}
.batch-row:hover{background:rgba(255,255,255,.025)}
.b-ico{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--a),var(--cyan));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;flex-shrink:0;box-shadow:0 6px 18px rgba(108,99,255,.35)}
.b-name{flex:1;font-weight:600;font-size:.95rem}
.b-meta{font-size:.78rem;color:var(--muted)}
/* Toggle switch */
.tog{position:relative;width:48px;height:26px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:#1e2538;border-radius:26px;cursor:pointer;transition:.3s;border:1px solid var(--border)}
.sl::before{content:'';position:absolute;height:20px;width:20px;left:2px;bottom:2px;background:#64748b;border-radius:50%;transition:.3s}
input:checked+.sl{background:rgba(34,197,94,.2);border-color:rgba(34,197,94,.4)}
input:checked+.sl::before{background:var(--green);transform:translateX(22px);box-shadow:0 0 8px rgba(34,197,94,.6)}
.chv{color:var(--muted);transition:transform .3s;flex-shrink:0}
.batch-block.open .chv{transform:rotate(180deg)}

/* Topics panel */
.topics-panel{display:none;border-top:1px solid var(--border)}
.batch-block.open .topics-panel{display:block}
.topic-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
.topic-row:last-child{border-bottom:none}
.topic-row:hover{background:rgba(255,255,255,.02)}
.t-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.t-status.on{background:var(--green);box-shadow:0 0 6px rgba(34,197,94,.6)}
.t-status.off{background:var(--red)}
.t-name{flex:1;font-size:.875rem;font-weight:500}
.t-count{font-size:.75rem;color:var(--muted);background:var(--border);padding:3px 10px;border-radius:100px;white-space:nowrap}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;gap:14px;color:var(--muted)}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--a);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* Toast */
.toast-wrap{position:fixed;bottom:28px;right:28px;z-index:9999;pointer-events:none}
.toast{background:rgba(15,22,41,.95);backdrop-filter:blur(20px);border:1px solid var(--border2);color:var(--text);padding:14px 20px;border-radius:14px;font-size:.875rem;font-weight:500;display:flex;align-items:center;gap:10px;transform:translateY(20px) scale(.95);opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:200px}
.toast.show{transform:translateY(0) scale(1);opacity:1}
.t-ico{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;background:rgba(34,197,94,.15);color:var(--green)}
</style>
</head>
<body>

<div class="orb-wrap"><div class="orb orb1"></div><div class="orb orb2"></div></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">StudyVault</div>
    <div class="login-sub">Admin Panel — Restricted Access</div>
    <label class="login-label" for="pwInput">Password</label>
    <input type="password" class="login-input" id="pwInput" placeholder="Enter admin password..." onkeydown="if(event.key==='Enter')login()"/>
    <button class="login-btn" onclick="login()">Login to Dashboard</button>
    <div class="login-err" id="loginErr">✕ Wrong password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-logo">StudyVault</div>
    <span class="h-badge">⚡ Admin</span>
    <button class="h-logout" onclick="logout()">Logout</button>
  </header>
  <div class="wrap">
    <div class="page-header">
      <div class="page-tag">🎛️ Control Panel</div>
      <div class="page-ttl">Visibility Control</div>
      <div class="page-desc">Toggle batches and topics — changes reflect instantly on the website.</div>
    </div>
    <div id="content">
      <div class="loading"><div class="spin"></div>Loading batches...</div>
    </div>
  </div>
</div>

<div class="toast-wrap"><div class="toast" id="toast"><div class="t-ico">✓</div>Changes saved!</div></div>

<script>
let TOK = localStorage.getItem('sv_tok') || '';
let BD = {};

async function login() {
  const pw = document.getElementById('pwInput').value;
  const err = document.getElementById('loginErr');
  err.style.display = 'none';
  try {
    const r = await fetch('/api/admin/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
    if (!r.ok) { err.style.display='block'; return; }
    const j = await r.json();
    TOK = j.token;
    localStorage.setItem('sv_tok', TOK);
    showApp();
  } catch(e) { err.style.display='block'; }
}

function logout() { localStorage.removeItem('sv_tok'); location.reload(); }

function showApp() {
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='block';
  load();
}

if (TOK) showApp();

async function load() {
  try {
    const r = await fetch('/api/admin/data', {headers:{'X-Admin-Token':TOK}});
    if (r.status===401) { logout(); return; }
    const j = await r.json();
    BD = j.batches || {};
    render();
  } catch(e) {
    document.getElementById('content').innerHTML='<div class="loading">✕ Failed to load</div>';
  }
}

function render() {
  const bs = Object.keys(BD);
  if (!bs.length) {
    document.getElementById('content').innerHTML='<div class="loading">No data yet — upload videos with the bot first.</div>';
    return;
  }
  document.getElementById('content').innerHTML = bs.map((b,bi) => {
    const bd = BD[b], ts = Object.keys(bd.topics||{});
    const tot = ts.reduce((s,t)=>s+bd.topics[t].lectures.length,0);
    const ic = b.substring(0,2).toUpperCase();
    const tRows = ts.map(t => {
      const td = bd.topics[t];
      const tk = encodeURIComponent(b+'||'+t);
      return `<div class="topic-row">
        <div class="t-status ${!td.hidden?'on':'off'}"></div>
        <div class="t-name">${t}</div>
        <div class="t-count">${td.lectures.length} lec</div>
        <label class="tog">
          <input type="checkbox"${!td.hidden?' checked':''} onchange="tog(decodeURIComponent('${tk}'),!this.checked)"/>
          <span class="sl"></span>
        </label>
      </div>`;
    }).join('');
    return `<div class="batch-block" id="bb${bi}">
      <div class="batch-row" onclick="toggleBlock(${bi})">
        <div class="b-ico">${ic}</div>
        <div>
          <div class="b-name">${b}</div>
          <div class="b-meta">${ts.length} topics · ${tot} lectures</div>
        </div>
        <div style="flex:1"></div>
        <label class="tog" onclick="event.stopPropagation()">
          <input type="checkbox"${!bd.hidden?' checked':''} onchange="tog('${encodeURIComponent(b)}',!this.checked)"/>
          <span class="sl"></span>
        </label>
        <svg class="chv" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
      </div>
      <div class="topics-panel">${tRows}</div>
    </div>`;
  }).join('');
}

function toggleBlock(i) {
  document.getElementById('bb'+i).classList.toggle('open');
}

async function tog(key, hidden) {
  try {
    await fetch('/api/admin/toggle',{method:'POST',headers:{'Content-Type':'application/json','X-Admin-Token':TOK},body:JSON.stringify({key,hidden})});
    showToast();
    await load();
  } catch(e) { alert('Save failed!'); }
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
</body>
</html>

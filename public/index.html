<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StudyVault — Premium Learning</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#04060e;--s1:#080d1a;--s2:#0c1222;--card:#0f1629;--card2:#121c33;
  --border:#1a2540;--border2:#243052;
  --a:#6c63ff;--a2:#8b5cf6;--cyan:#06d6f5;--pink:#f472b6;--gold:#fbbf24;
  --text:#e8eaf6;--muted:#64748b;--muted2:#94a3b8;
  --r:16px;--r2:24px;
  --glow1:rgba(108,99,255,0.15);--glow2:rgba(6,214,245,0.1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── BACKGROUND ORBS ── */
.orb-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:drift 20s ease-in-out infinite alternate}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#6c63ff,transparent);top:-100px;left:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#06d6f5,transparent);bottom:-80px;right:-80px}

/* ── NAVBAR ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 32px;height:64px;display:flex;align-items:center;backdrop-filter:blur(24px);background:rgba(4,6,14,.75);border-bottom:1px solid rgba(255,255,255,.05)}
.nav-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.3rem;background:linear-gradient(135deg,var(--a),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}

/* ── PAGE SYSTEM ── */
.page{display:none;position:relative;z-index:1;min-height:100vh;padding-top:64px}
.page.active{display:block}

/* ── STEALTH PLAYER STYLING ── */
.player-layout{display:grid;grid-template-columns:1fr 360px;height:calc(100vh - 64px);overflow:hidden}
.player-main{overflow-y:auto;padding:24px}
.player-video-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:var(--r2);overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.8)}

/* IMPORTANT: YT Stealth Clipping */
#ytContainer{position:absolute;top:-65px;left:-2px;width:calc(100% + 4px);height:calc(100% + 130px);z-index:1;pointer-events:none}

.yt-mask-top{position:absolute;top:0;left:0;right:0;height:66px;background:#000;z-index:2}
.yt-mask-bot{position:absolute;bottom:0;left:0;right:0;height:66px;background:#000;z-index:2}
.yt-mask-corner{position:absolute;top:66px;left:0;width:180px;height:45px;background:#000;z-index:2}

/* Overlay and Controls */
.player-overlay{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;cursor:default}
.play-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none}
.player-overlay.paused .play-center{opacity:1}
.play-btn-big{width:80px;height:80px;border-radius:50%;background:rgba(108,99,255,.85);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 40px rgba(108,99,255,.6);cursor:pointer;pointer-events:auto}

.player-controls{background:linear-gradient(transparent,rgba(0,0,0,.95));padding:20px;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:auto}
.player-overlay:hover .player-controls, .player-overlay.paused .player-controls{opacity:1;transform:translateY(0)}

.progress-wrap{height:5px;background:rgba(255,255,255,.15);border-radius:4px;cursor:pointer;margin-bottom:15px;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--a),var(--cyan));width:0%;border-radius:4px}

.controls-row{display:flex;align-items:center;gap:12px}
.ctrl-btn{background:none;border:none;color:#fff;cursor:pointer;display:flex;align-items:center;transition:0.2s}
.ctrl-btn:hover{transform:scale(1.15);color:var(--cyan)}
.time-disp{font-size:.85rem;font-family:'Space Grotesk',sans-serif;color:var(--muted2);margin-left:5px}
.ctrl-spacer{flex:1}

.speed-sel, .qual-sel{background:rgba(255,255,255,0.08);border:1px solid var(--border);color:#fff;font-size:.75rem;padding:5px 8px;border-radius:8px;cursor:pointer;outline:none}

/* Subject Cards */
.subjects-wrap{max-width:1200px;margin:40px auto;padding:0 24px}
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.subj-card{background:var(--card);padding:30px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border);transition:0.3s}
.subj-card:hover{transform:translateY(-5px);border-color:var(--a)}

@media(max-width:900px){.player-layout{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="orb-wrap">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<nav id="navbar">
  <div class="nav-logo" onclick="goPage('home')">Study<span>Vault</span></div>
</nav>

<div class="page active" id="page-home">
  <div class="subjects-wrap">
    <h2 style="margin-bottom:20px;">📁 Subjects</h2>
    <div class="subjects-grid" id="subjectsGrid">
        <div style="color:var(--muted)">Loading your library...</div>
    </div>
  </div>
</div>

<div class="page" id="page-player">
  <div class="player-layout">
    <div class="player-main">
      <div class="player-video-wrap">
        <div id="ytContainer"></div>
        
        <div class="yt-mask-top"></div>
        <div class="yt-mask-bot"></div>
        <div class="yt-mask-corner"></div>

        <div class="player-overlay paused" id="playerOverlay">
          <div class="play-center">
            <div class="play-btn-big" onclick="tPlay()">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>

          <div class="player-controls">
            <div class="progress-wrap" onclick="seekBar(event)" id="pWrap">
              <div class="progress-fill" id="pFill"></div>
            </div>
            <div class="controls-row">
              <button class="ctrl-btn" onclick="tPlay()" id="playBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </button>
              <button class="ctrl-btn" onclick="skipSec(-10)" title="Rewind 10s">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg>
              </button>
              <button class="ctrl-btn" onclick="skipSec(10)" title="Forward 10s">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13 6v12l8.5-6L13 6zM4 6v12l8.5-6L4 6z"/></svg>
              </button>
              <span class="time-disp" id="timeDisp">0:00 / 0:00</span>
              
              <div class="ctrl-spacer"></div>

              <select class="speed-sel" onchange="setSp(this.value)">
                <option value="0.5">0.5x</option><option value="1" selected>1x</option>
                <option value="1.5">1.5x</option><option value="2">2x</option>
              </select>
              
              <select class="qual-sel" id="qualSel" onchange="setQ(this.value)">
                <option value="auto">Auto Quality</option>
              </select>

              <button class="ctrl-btn" onclick="tFS()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
      <div class="player-info" style="margin-top:20px;">
        <h1 id="pTitle" style="font-family:'Space Grotesk'; font-size:1.5rem;">Lecture Title</h1>
        <p id="pMeta" style="color:var(--muted2); margin-top:5px;">Batch Info</p>
      </div>
    </div>
    <div class="playlist-sidebar" style="background:var(--s1); padding:20px; border-left:1px solid var(--border);">
        <h3 style="margin-bottom:15px; font-family:'Space Grotesk';">Playlist</h3>
        <div id="sidePlaylist"></div>
    </div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
let DATA = {};
let player = null;
let timerID = null;

async function boot() {
  try {
    const r = await fetch('/api/data');
    const j = await r.json();
    DATA = j.batches || {};
    renderHome();
  } catch(e) { console.error("Data load failed"); }
}

function renderHome() {
  const grid = document.getElementById('subjectsGrid');
  const batches = Object.keys(DATA);
  if(!batches.length) { grid.innerHTML = "No videos found."; return; }
  grid.innerHTML = batches.map(b => `
    <div class="subj-card" onclick="openBatch('${b}')">
        <div style="font-size:2rem; margin-bottom:10px;">📚</div>
        <div style="font-weight:700; font-size:1.1rem;">${b}</div>
        <div style="font-size:0.85rem; color:var(--muted2); margin-top:5px;">Explore Chapters ›</div>
    </div>`).join('');
}

function openBatch(b) {
    const topics = DATA[b];
    const firstTopic = Object.keys(topics)[0];
    const firstLec = topics[firstTopic][0];
    playVideo(firstLec.yt_id, firstLec.title, b, firstTopic);
    goPage('player');
}

function goPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
}

// ── PLAYER LOGIC ──

function playVideo(vid, title, batch, topic) {
  document.getElementById('pTitle').textContent = title;
  document.getElementById('pMeta').textContent = `${batch} • ${topic}`;

  if (player && player.loadVideoById) {
    player.loadVideoById(vid);
  } else {
    player = new YT.Player('ytContainer', {
      videoId: vid,
      playerVars: { 
        controls: 0, modestbranding: 1, rel: 0, iv_load_policy: 3, 
        disablekb: 1, fs: 0, playsinline: 1, enablejsapi: 1 
      },
      events: {
        onReady: e => { e.target.playVideo(); setPaused(false); },
        onStateChange: onStateChange
      }
    });
  }
}

function onStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) { 
      setPaused(false); 
      startTimer(); 
      loadQualities(); 
  } else { 
      setPaused(true); 
      stopTimer(); 
  }
}

function setPaused(p) {
  const overlay = document.getElementById('playerOverlay');
  overlay.classList.toggle('paused', p);
  document.getElementById('playBtn').innerHTML = p 
    ? '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>' 
    : '<svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';
}

function tPlay() { 
    if(!player) return;
    const state = player.getPlayerState();
    state === YT.PlayerState.PLAYING ? player.pauseVideo() : player.playVideo();
}

function skipSec(s) { if(player) player.seekTo(player.getCurrentTime() + s, true); }

function setSp(v) { if(player) player.setPlaybackRate(parseFloat(v)); }

function setQ(v) { if(player) player.setPlaybackQuality(v === 'auto' ? 'default' : v); }

function loadQualities() {
  if(!player || !player.getAvailableQualityLevels) return;
  const lvls = player.getAvailableQualityLevels();
  const sel = document.getElementById('qualSel');
  sel.innerHTML = '<option value="auto">Auto Quality</option>' + 
    lvls.map(q => `<option value="${q}">${q}</option>`).join('');
}

function startTimer() {
  stopTimer();
  timerID = setInterval(() => {
    if(!player || !player.getCurrentTime) return;
    const c = player.getCurrentTime(), d = player.getDuration();
    if(d > 0) {
        document.getElementById('pFill').style.width = (c/d*100)+'%';
        document.getElementById('timeDisp').textContent = `${fmt(c)} / ${fmt(d)}`;
    }
  }, 500);
}

function stopTimer() { clearInterval(timerID); }

function fmt(s) { 
    const m = Math.floor(s/60), sc = Math.floor(s%60); 
    return `${m}:${sc.toString().padStart(2,'0')}`; 
}

function seekBar(e) {
  if(!player) return;
  const b = document.getElementById('pWrap');
  const pct = e.offsetX / b.offsetWidth;
  player.seekTo(pct * player.getDuration(), true);
}

function tFS() {
    const el = document.querySelector('.player-video-wrap');
    if (!document.fullscreenElement) el.requestFullscreen();
    else document.exitFullscreen();
}

boot();
</script>
</body>
</html>
